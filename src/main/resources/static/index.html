<p id="message"></p>

<hr>

<section>
    <h2>회원 관리</h2>

    <h3>회원 등록</h3>
    <form id="memberCreateForm">
        <label>
            이름:
            <input type="text" id="memberName">
        </label>
        <label>
            이메일:
            <input type="email" id="memberEmail">
        </label>
        <button type="submit">회원 등록</button>
    </form>

    <h3>회원 목록</h3>
    <button type="button" onclick="loadMembers()">회원 목록 새로고침</button>
    <table border="1" cellpadding="5">
        <thead>
            <tr>
                <th>회원 번호</th>
                <th>이름</th>
                <th>이메일</th>
                <th>수정</th>
                <th>삭제</th>
                <th>주문 조회</th>
            </tr>
        </thead>
        <tbody id="memberTableBody"></tbody>
    </table>

    <h3>회원별 주문 목록</h3>
    <div id="memberOrdersArea">
        <p>회원 목록에서 주문 조회 버튼을 누르세요.</p>
    </div>
</section>

<section>
    <h2>상품 목록</h2>
    <button type="button" onclick="loadProducts()">상품 목록 새로고침</button>
    <table border="1" cellpadding="5">
        <thead>
            <tr>
                <th>상품 번호</th>
                <th>상품명</th>
                <th>가격</th>
                <th>재고</th>
            </tr>
        </thead>
        <tbody id="productTableBody"></tbody>
    </table>
</section>

<hr>

<section>
    <h2>주문 생성</h2>

    <form id="orderCreateForm">
        <div>
            <label>
                회원 선택:
                <select id="orderMemberSelect"></select>
            </label>
        </div>

        <h3>주문 상품</h3>
        <div id="orderItemsContainer"></div>

        <button type="button" onclick="addOrderItemRow()">상품 추가</button>
        <button type="submit">주문 생성</button>
    </form>
</section>

<hr>

<section>
    <h2>주문 관리</h2>

    <button type="button" onclick="loadOrders()">주문 목록 새로고침</button>

    <table border="1" cellpadding="5">
        <thead>
            <tr>
                <th>주문 번호</th>
                <th>회원 번호</th>
                <th>주문 일시</th>
                <th>상태</th>
                <th>단건 조회</th>
                <th>주문 취소</th>
            </tr>
        </thead>
        <tbody id="orderTableBody"></tbody>
    </table>

    <h3>주문 단건 조회 결과</h3>
    <pre id="orderDetailArea">주문 목록에서 단건 조회 버튼을 누르세요.</pre>
</section>

<script>
    const API_BASE = "";

    let members = [];
    let products = [];
    let orders = [];

    document.addEventListener("DOMContentLoaded", async function () {
        document.getElementById("memberCreateForm").addEventListener("submit", createMember);
        document.getElementById("orderCreateForm").addEventListener("submit", createOrder);

        await loadInitialData();
    });

    async function loadInitialData() {
        await loadMembers();
        await loadProducts();
        await loadOrders();

        addOrderItemRow();
    }

    async function request(url, options = {}) {
        const response = await fetch(API_BASE + url, options);
        const text = await response.text();

        if (!response.ok) {
            throw new Error(text || response.status);
        }

        const contentType = response.headers.get("content-type");

        if (contentType && contentType.includes("application/json") && text) {
            return JSON.parse(text);
        }

        return text;
    }

    function setMessage(message) {
        document.getElementById("message").textContent = message;
    }

    function escapeHtml(value) {
        return String(value ?? "")
            .replaceAll("&", "&amp;")
            .replaceAll("<", "&lt;")
            .replaceAll(">", "&gt;")
            .replaceAll('"', "&quot;")
            .replaceAll("'", "&#039;");
    }

    function formatDate(value) {
        return value ? escapeHtml(value) : "";
    }

    // =========================
    // Member
    // =========================

    async function loadMembers() {
        try {
            members = await request("/members");
            renderMembers();
            renderMemberSelect();
            setMessage("회원 목록을 조회했습니다.");
        } catch (error) {
            setMessage("회원 목록 조회 실패: " + error.message);
        }
    }

    function renderMembers() {
        const tbody = document.getElementById("memberTableBody");
        tbody.innerHTML = "";

        members.forEach(member => {
            const tr = document.createElement("tr");

            tr.innerHTML = `
                <td>${escapeHtml(member.number)}</td>
                <td>
                    <input type="text" id="member-name-${member.number}" value="${escapeHtml(member.name)}">
                </td>
                <td>
                    <input type="email" id="member-email-${member.number}" value="${escapeHtml(member.email)}">
                </td>
                <td>
                    <button type="button" onclick="updateMember(${member.number})">수정</button>
                </td>
                <td>
                    <button type="button" onclick="deleteMember(${member.number})">삭제</button>
                </td>
                <td>
                    <button type="button" onclick="loadMemberOrders(${member.number})">주문 조회</button>
                </td>
            `;

            tbody.appendChild(tr);
        });
    }

    function renderMemberSelect() {
        const select = document.getElementById("orderMemberSelect");
        select.innerHTML = "";

        members.forEach(member => {
            const option = document.createElement("option");
            option.value = member.number;
            option.textContent = `${member.number} - ${member.name} (${member.email})`;
            select.appendChild(option);
        });
    }

    async function createMember(event) {
        event.preventDefault();

        const name = document.getElementById("memberName").value;
        const email = document.getElementById("memberEmail").value;

        try {
            await request("/members", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({
                    name: name,
                    email: email
                })
            });

            document.getElementById("memberName").value = "";
            document.getElementById("memberEmail").value = "";

            await loadMembers();
            setMessage("회원을 등록했습니다.");
        } catch (error) {
            setMessage("회원 등록 실패: " + error.message);
        }
    }

    async function updateMember(number) {
        const name = document.getElementById(`member-name-${number}`).value;
        const email = document.getElementById(`member-email-${number}`).value;

        try {
            await request(`/members/${number}`, {
                method: "PUT",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({
                    name: name,
                    email: email
                })
            });

            await loadMembers();
            setMessage("회원을 수정했습니다.");
        } catch (error) {
            setMessage("회원 수정 실패: " + error.message);
        }
    }

    async function deleteMember(number) {
        try {
            await request(`/members/${number}`, {
                method: "DELETE"
            });

            await loadMembers();
            setMessage("회원을 삭제했습니다.");
        } catch (error) {
            setMessage("회원 삭제 실패: " + error.message);
        }
    }

    async function loadMemberOrders(memberId) {
        try {
            const memberOrders = await request(`/members/${memberId}/orders`);
            renderMemberOrders(memberOrders);
            setMessage(`회원 ${memberId}의 주문 목록을 조회했습니다.`);
        } catch (error) {
            setMessage("회원별 주문 조회 실패: " + error.message);
        }
    }

    function renderMemberOrders(memberOrders) {
        const area = document.getElementById("memberOrdersArea");

        if (!memberOrders || memberOrders.length === 0) {
            area.innerHTML = "<p>해당 회원의 주문이 없습니다.</p>";
            return;
        }

        let html = `
            <table border="1" cellpadding="5">
                <thead>
                    <tr>
                        <th>주문 번호</th>
                        <th>회원 번호</th>
                        <th>주문 일시</th>
                        <th>상태</th>
                    </tr>
                </thead>
                <tbody>
        `;

        memberOrders.forEach(order => {
            html += `
                <tr>
                    <td>${escapeHtml(order.number)}</td>
                    <td>${escapeHtml(order.memberId)}</td>
                    <td>${formatDate(order.orderDate)}</td>
                    <td>${escapeHtml(order.status)}</td>
                </tr>
            `;
        });

        html += `
                </tbody>
            </table>
        `;

        area.innerHTML = html;
    }

    // =========================
    // Product
    // =========================

    async function loadProducts() {
        try {
            products = await request("/products");
            renderProducts();
            refreshOrderItemProductOptions();
            setMessage("상품 목록을 조회했습니다.");
        } catch (error) {
            setMessage("상품 목록 조회 실패: " + error.message);
        }
    }

    function renderProducts() {
        const tbody = document.getElementById("productTableBody");
        tbody.innerHTML = "";

        products.forEach(product => {
            const tr = document.createElement("tr");

            tr.innerHTML = `
                <td>${escapeHtml(product.number)}</td>
                <td>${escapeHtml(product.name)}</td>
                <td>${escapeHtml(product.price)}</td>
                <td>${escapeHtml(product.stock)}</td>
            `;

            tbody.appendChild(tr);
        });
    }

    function productOptionsHtml(selectedValue = "") {
        let html = "";

        products.forEach(product => {
            const selected = String(product.number) === String(selectedValue) ? "selected" : "";
            html += `
                <option value="${escapeHtml(product.number)}" ${selected}>
                    ${escapeHtml(product.number)} - ${escapeHtml(product.name)} / ${escapeHtml(product.price)}원 / 재고 ${escapeHtml(product.stock)}
                </option>
            `;
        });

        return html;
    }

    // =========================
    // Order
    // =========================

    async function loadOrders() {
        try {
            orders = await request("/orders");
            renderOrders();
            setMessage("주문 목록을 조회했습니다.");
        } catch (error) {
            setMessage("주문 목록 조회 실패: " + error.message);
        }
    }

    function renderOrders() {
        const tbody = document.getElementById("orderTableBody");
        tbody.innerHTML = "";

        orders.forEach(order => {
            const tr = document.createElement("tr");

            const cancelButton = order.status === "CANCEL"
                ? ""
                : `<button type="button" onclick="cancelOrder(${order.number})">주문 취소</button>`;

            tr.innerHTML = `
                <td>${escapeHtml(order.number)}</td>
                <td>${escapeHtml(order.memberId)}</td>
                <td>${formatDate(order.orderDate)}</td>
                <td>${escapeHtml(order.status)}</td>
                <td>
                    <button type="button" onclick="loadOrderDetail(${order.number})">단건 조회</button>
                </td>
                <td>
                    ${cancelButton}
                </td>
            `;

            tbody.appendChild(tr);
        });
    }

    async function loadOrderDetail(orderId) {
        try {
            const order = await request(`/orders/${orderId}`);
            document.getElementById("orderDetailArea").textContent = JSON.stringify(order, null, 2);
            setMessage(`주문 ${orderId}번을 조회했습니다.`);
        } catch (error) {
            setMessage("주문 단건 조회 실패: " + error.message);
        }
    }

    function addOrderItemRow() {
        const container = document.getElementById("orderItemsContainer");

        const row = document.createElement("div");
        row.className = "order-item-row";

        row.innerHTML = `
            <label>
                상품:
                <select class="order-product-select">
                    ${productOptionsHtml()}
                </select>
            </label>
            <label>
                수량:
                <input type="number" class="order-count-input" min="1" value="1">
            </label>
            <button type="button" onclick="removeOrderItemRow(this)">삭제</button>
        `;

        container.appendChild(row);
    }

    function removeOrderItemRow(button) {
        const row = button.parentElement;
        row.remove();
    }

    function refreshOrderItemProductOptions() {
        const selects = document.querySelectorAll(".order-product-select");

        selects.forEach(select => {
            const selectedValue = select.value;
            select.innerHTML = productOptionsHtml(selectedValue);
        });
    }

    async function createOrder(event) {
        event.preventDefault();

        const memberId = document.getElementById("orderMemberSelect").value;
        const rows = document.querySelectorAll(".order-item-row");

        const requestBody = [];

        rows.forEach(row => {
            const productNumber = row.querySelector(".order-product-select").value;
            const count = row.querySelector(".order-count-input").value;

            requestBody.push({
                memberId: Number(memberId),
                productNumber: Number(productNumber),
                count: Number(count)
            });
        });

        try {
            await request("/orders", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify(requestBody)
            });

            document.getElementById("orderItemsContainer").innerHTML = "";
            addOrderItemRow();

            await loadOrders();
            await loadProducts();

            setMessage("주문을 생성했습니다.");
        } catch (error) {
            setMessage("주문 생성 실패: " + error.message);
        }
    }

    async function cancelOrder(orderId) {
        try {
            await request(`/orders/${orderId}`, {
                method: "DELETE"
            });

            await loadOrders();
            await loadProducts();

            setMessage(`주문 ${orderId}번을 취소했습니다.`);
        } catch (error) {
            setMessage("주문 취소 실패: " + error.message);
        }
    }
</script>
